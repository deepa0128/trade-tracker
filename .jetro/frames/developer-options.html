<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Developer Options</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --blue: #58a6ff; --purple: #bc8cff; --orange: #e3b341;
    --accent: #238636;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .header-badge { font-size: 10px; padding: 2px 7px; border-radius: 12px; background: #1f2d1f; color: var(--green); border: 1px solid #2d4a2d; font-weight: 500; }
  .header-badge.warn { background: #2d2400; color: var(--yellow); border-color: #4a3800; }
  .header-badge.err  { background: #2d1515; color: var(--red);    border-color: #4a2020; }
  .refresh-btn { margin-left: auto; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; transition: all .15s; }
  .refresh-btn:hover { background: var(--card); color: var(--text); }
  .ts { font-size: 11px; color: var(--muted); }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 12px; flex-shrink: 0; overflow-x: auto; }
  .tab { padding: 9px 14px; cursor: pointer; font-size: 12px; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .content { flex: 1; overflow-y: auto; padding: 14px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .card-val { font-size: 20px; font-weight: 600; }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.up { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.healthy { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.degraded { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .dot.down { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .dot.unknown { background: var(--muted); }

  .resource-row { display: flex; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--border); }
  .resource-row:last-child { border-bottom: none; }
  .resource-name { font-weight: 500; flex: 1; }
  .resource-status { font-size: 11px; font-weight: 500; margin-right: 12px; }
  .resource-meta { font-size: 11px; color: var(--muted); }
  .status-up { color: var(--green); }
  .status-healthy { color: var(--green); }
  .status-degraded { color: var(--yellow); }
  .status-down { color: var(--red); }

  .section { margin-bottom: 14px; }
  .section-hdr { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 7px 10px; border-bottom: 1px solid rgba(48,54,61,.5); font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }

  .chip { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
  .chip.NSE { background: #1a2d40; color: var(--blue); border: 1px solid #1e3a52; }
  .chip.BSE { background: #2d1f40; color: var(--purple); border: 1px solid #3d2a52; }
  .chip.NSE_BSE { background: #1f2d1f; color: var(--green); border: 1px solid #2a3d2a; }

  .meter { background: var(--border); border-radius: 4px; height: 6px; margin-top: 5px; overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 4px; transition: width .5s; }
  .meter-fill.green { background: var(--green); }
  .meter-fill.yellow { background: var(--yellow); }
  .meter-fill.red { background: var(--red); }

  .route-line { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 4px; }
  .route-line:hover { background: rgba(255,255,255,.03); }
  .method { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; min-width: 46px; text-align: center; }
  .method.GET    { background: #1a3040; color: #58a6ff; }
  .method.POST   { background: #1f3020; color: #3fb950; }
  .method.DELETE { background: #3d1515; color: #f85149; }
  .route-path { font-family: monospace; font-size: 12px; color: var(--text); }
  .route-desc { font-size: 11px; color: var(--muted); margin-left: auto; }

  .env-row { display: flex; padding: 6px 10px; border-bottom: 1px solid rgba(48,54,61,.4); font-family: monospace; font-size: 11px; }
  .env-row:last-child { border-bottom: none; }
  .env-key { color: var(--blue); min-width: 200px; }
  .env-val { color: var(--text); }
  .env-val.redacted { color: var(--muted); font-style: italic; }

  .error-banner { background: #2d1515; border: 1px solid #4a2020; border-radius: 8px; padding: 12px; color: var(--red); font-size: 12px; margin-bottom: 14px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Action buttons */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text); transition: all .15s; }
  .btn:hover { background: #2d3340; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.danger { border-color: #4a2020; color: var(--red); }
  .btn.danger:hover { background: #2d1515; }
  .btn.primary { border-color: #1e3a52; color: var(--blue); }
  .btn.primary:hover { background: #1a2d40; }
  .btn.success { border-color: #2d4a2d; color: var(--green); }
  .btn.success:hover { background: #1f2d1f; }

  /* Provider cards */
  .provider-card { border: 2px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all .2s; background: var(--card); }
  .provider-card:hover { border-color: var(--blue); }
  .provider-card.active { border-color: var(--green); background: #111d11; }
  .provider-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .provider-desc { font-size: 11px; color: var(--muted); }
  .provider-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; float: right; }
  .provider-badge.live { background: #1f2d1f; color: var(--green); }
  .provider-badge.mock { background: #2d2400; color: var(--yellow); }

  /* Log table */
  .log-row { display: grid; grid-template-columns: 36px 48px 180px 52px 68px; gap: 0; align-items: center; padding: 5px 10px; border-bottom: 1px solid rgba(48,54,61,.4); font-size: 11px; }
  .log-row:hover { background: rgba(255,255,255,.02); }
  .log-row:last-child { border-bottom: none; }
  .log-hdr { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; background: rgba(0,0,0,.2); }
  .status-2xx { color: var(--green); font-weight: 600; }
  .status-4xx { color: var(--yellow); font-weight: 600; }
  .status-5xx { color: var(--red); font-weight: 600; }
  .log-url { font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .toast { position: fixed; bottom: 16px; right: 16px; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; z-index: 999; transition: opacity .3s; }
  .toast.ok  { background: #1f3020; color: var(--green); border: 1px solid #2d4a2d; }
  .toast.err { background: #2d1515; color: var(--red);   border: 1px solid #4a2020; }
</style>
</head>
<body>

<div class="header">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="3" fill="#238636"/><path d="M5 5l2 2-2 2M9 9h2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span class="header-title">Developer Options</span>
  <span id="overall-badge" class="header-badge warn">Loading…</span>
  <span class="ts" id="gen-ts"></span>
  <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">Overview</div>
  <div class="tab" onclick="switchTab('provider')">Provider</div>
  <div class="tab" onclick="switchTab('logs')">Request Logs</div>
  <div class="tab" onclick="switchTab('routes')">API Routes</div>
  <div class="tab" onclick="switchTab('runtime')">Runtime</div>
  <div class="tab" onclick="switchTab('database')">Database</div>
  <div class="tab" onclick="switchTab('env')">Config</div>
</div>

<div class="content">

  <div id="panel-overview" class="panel active">
    <div id="overview-content"><div class="loading"><div class="spinner"></div><br>Fetching diagnostics…</div></div>
  </div>

  <div id="panel-provider" class="panel">
    <div id="provider-content"><div class="loading"><div class="spinner"></div><br>Loading…</div></div>
  </div>

  <div id="panel-logs" class="panel">
    <div id="logs-content"><div class="loading"><div class="spinner"></div><br>Loading…</div></div>
  </div>

  <div id="panel-routes" class="panel">
    <div id="routes-content"><div class="loading"><div class="spinner"></div><br>Loading…</div></div>
  </div>

  <div id="panel-runtime" class="panel">
    <div id="runtime-content"><div class="loading"><div class="spinner"></div><br>Loading…</div></div>
  </div>

  <div id="panel-database" class="panel">
    <div id="database-content"><div class="loading"><div class="spinner"></div><br>Loading…</div></div>
  </div>

  <div id="panel-env" class="panel">
    <div id="env-content"><div class="loading"><div class="spinner"></div><br>Loading…</div></div>
  </div>

</div>

<div id="toast" style="display:none" class="toast"></div>

<script>
const BASE = 'http://localhost:3000';
var devData = null;
var logsData = [];

var TABS = ['overview','provider','logs','routes','runtime','database','env'];

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', TABS[i] === name);
  });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'logs') loadLogs();
  if (name === 'provider') loadProvider();
}

function statusDot(s) {
  return '<span class="dot ' + (s || 'unknown') + '"></span>';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'ok');
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 2500);
}

// ── Overview ─────────────────────────────────────────────────────────────────

function renderOverview(d) {
  var h = d.health;
  var r = d.runtime;
  var overall = h.status;

  var badge = document.getElementById('overall-badge');
  badge.textContent = overall === 'healthy' ? 'All Systems Operational' : overall === 'degraded' ? 'Degraded' : 'Outage';
  badge.className = 'header-badge' + (overall === 'healthy' ? '' : overall === 'degraded' ? ' warn' : ' err');
  document.getElementById('gen-ts').textContent = new Date(d.generatedAt).toLocaleTimeString();

  var memPct = Math.round(r.memoryMb.heapUsed / r.memoryMb.heapTotal * 100);
  var memColor = memPct > 85 ? 'red' : memPct > 65 ? 'yellow' : 'green';
  var uptime = r.uptimeSeconds;
  var uh = Math.floor(uptime/3600), um = Math.floor((uptime%3600)/60), us = uptime%60;
  var uptimeStr = uh ? uh + 'h ' + um + 'm' : um ? um + 'm ' + us + 's' : us + 's';
  var cacheCount = Array.isArray(d.cache.entries) ? d.cache.entries.length : (d.cache.entries.size ?? 0);

  document.getElementById('overview-content').innerHTML =
    '<div class="grid-4">' +
      '<div class="card"><div class="card-title">System Status</div>' +
        '<div class="card-val">' + statusDot(overall) + overall.toUpperCase() + '</div>' +
        '<div class="card-sub">All components checked</div></div>' +
      '<div class="card"><div class="card-title">Uptime</div>' +
        '<div class="card-val" style="color:var(--green)">' + uptimeStr + '</div>' +
        '<div class="card-sub">PID ' + r.pid + '</div></div>' +
      '<div class="card"><div class="card-title">Heap Used</div>' +
        '<div class="card-val" style="color:var(--' + memColor + ')">' + r.memoryMb.heapUsed + ' MB</div>' +
        '<div class="card-sub">of ' + r.memoryMb.heapTotal + ' MB total</div>' +
        '<div class="meter"><div class="meter-fill ' + memColor + '" style="width:' + memPct + '%"></div></div></div>' +
      '<div class="card"><div class="card-title">Cache Entries</div>' +
        '<div class="card-val" style="color:var(--blue)">' + cacheCount + '</div>' +
        '<div class="card-sub">In-memory quote TTL 60s</div></div>' +
    '</div>' +
    '<div class="section"><div class="section-hdr">Component Health</div>' +
      '<div class="card" style="padding:0">' +
        Object.entries(h.components || {}).map(function(pair) {
          var name = pair[0], comp = pair[1];
          var sc = comp.status === 'healthy' ? 'status-healthy' : comp.status === 'degraded' ? 'status-degraded' : 'status-down';
          return '<div class="resource-row">' + statusDot(comp.status) +
            '<span class="resource-name">' + name + '</span>' +
            '<span class="resource-status ' + sc + '">' + comp.status.toUpperCase() + '</span>' +
            '<span class="resource-meta">' + (comp.latencyMs != null ? comp.latencyMs + 'ms' : '') + ' ' + (comp.message || '') + '</span></div>';
        }).join('') +
      '</div></div>' +
    '<div class="section"><div class="section-hdr">Exchange Registry</div>' +
      '<div class="card" style="padding:0">' +
        d.exchanges.map(function(ex) {
          return '<div class="resource-row">' +
            '<span class="chip ' + ex.id + '">' + ex.id + '</span>' +
            '<span class="resource-name" style="margin-left:8px">' + ex.displayName + '</span>' +
            '<span class="resource-meta">' + ex.currency + ' · ' + ex.timezone + '</span></div>';
        }).join('') +
      '</div></div>';
}

// ── Provider ─────────────────────────────────────────────────────────────────

var currentProvider = 'mock';

var PROVIDERS = [
  { type: 'yfinance', name: 'yfinance', badge: 'live', desc: 'Yahoo Finance via Python subprocess. Fetches real NSE/BSE/global quotes. Requires Python + yfinance installed.', color: 'var(--green)' },
  { type: 'mock',     name: 'Mock',     badge: 'mock', desc: 'Deterministic random data seeded by ticker. Zero latency, no external calls. Used for tests and offline work.', color: 'var(--yellow)' },
];

async function loadProvider() {
  try {
    var res = await fetch(BASE + '/api/dev/provider');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var d = await res.json();
    currentProvider = d.type;
    renderProvider(d);
  } catch(e) {
    document.getElementById('provider-content').innerHTML = '<div class="error-banner">⚠ ' + escapeHtml(e.message) + '</div>';
  }
}

function renderProvider(d) {
  var quoteResultId = 'quote-result-' + Date.now();
  document.getElementById('provider-content').innerHTML =
    '<div class="section"><div class="section-hdr">Active Market Data Provider</div>' +
      '<div class="grid-2">' +
        PROVIDERS.map(function(p) {
          var isActive = d.type === p.type;
          return '<div class="provider-card' + (isActive ? ' active' : '') + '" onclick="switchProvider(\'' + p.type + '\')">' +
            '<span class="provider-badge ' + p.badge + '">' + (isActive ? '● ACTIVE' : p.badge.toUpperCase()) + '</span>' +
            '<div class="provider-name" style="color:' + (isActive ? 'var(--green)' : 'var(--text)') + '">' + p.name + '</div>' +
            '<div class="provider-desc" style="margin-top:6px">' + p.desc + '</div>' +
            (isActive && !d.available ? '<div style="color:var(--red);font-size:11px;margin-top:6px">⚠ Provider unavailable — degraded to mock</div>' : '') +
          '</div>';
        }).join('') +
      '</div></div>' +
    '<div class="section"><div class="section-hdr">Test Quote</div>' +
      '<div class="card">' +
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">' +
          '<input id="quote-ticker-input" type="text" value="TCS.NS" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:monospace;font-size:12px;width:140px"/>' +
          '<button class="btn primary" onclick="testQuote()">Fetch Quote</button>' +
        '</div>' +
        '<div id="quote-result" style="font-family:monospace;font-size:11px;color:var(--muted)">Enter a ticker and click Fetch Quote</div>' +
      '</div></div>' +
    '<div class="section"><div class="section-hdr" style="justify-content:space-between">Cache Management <button class="btn danger" onclick="clearCache()">⊘ Clear Cache + Logs</button></div>' +
      '<div class="card">' +
        '<div style="font-size:12px;color:var(--muted)">Evicts all cached quotes from the in-memory store and clears the request log ring buffer. The next request to each ticker will trigger a fresh provider fetch.</div>' +
      '</div></div>';
}

async function switchProvider(type) {
  if (type === currentProvider) return;
  try {
    var res = await fetch(BASE + '/api/dev/provider/' + type, { method: 'POST' });
    var d = await res.json();
    if (!res.ok) { toast(d.error || 'Switch failed', 'err'); return; }
    currentProvider = d.type;
    toast('Switched to ' + d.type + (d.available ? '' : ' (unavailable — using mock)'), d.available ? 'ok' : 'err');
    loadProvider();
    loadAll();
  } catch(e) {
    toast(e.message, 'err');
  }
}

async function testQuote() {
  var ticker = document.getElementById('quote-ticker-input').value.trim() || 'TCS.NS';
  var el = document.getElementById('quote-result');
  el.textContent = 'Fetching…';
  try {
    var res = await fetch(BASE + '/api/market/quote/' + encodeURIComponent(ticker));
    var d = await res.json();
    if (!res.ok) { el.style.color = 'var(--red)'; el.textContent = d.error || 'Error ' + res.status; return; }
    el.style.color = 'var(--text)';
    el.innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">' +
        kv('Ticker', d.ticker) + kv('Price', '₹' + d.price) +
        kv('Change', (d.change >= 0 ? '+' : '') + d.change + ' (' + d.changePct + '%)') +
        kv('Open', '₹' + d.open) + kv('High', '₹' + d.high) + kv('Low', '₹' + d.low) +
        kv('Prev Close', '₹' + d.previousClose) + kv('Volume', (d.volume||0).toLocaleString()) + kv('Fetched', new Date(d.fetchedAt).toLocaleTimeString()) +
      '</div>';
  } catch(e) {
    el.style.color = 'var(--red)';
    el.textContent = e.message;
  }
}

function kv(k, v) {
  return '<div><div style="color:var(--muted);font-size:10px;text-transform:uppercase;margin-bottom:2px">' + k + '</div>' +
    '<div style="color:var(--text);font-weight:500">' + escapeHtml(String(v)) + '</div></div>';
}

async function clearCache() {
  try {
    var res = await fetch(BASE + '/api/dev/cache', { method: 'DELETE' });
    var d = await res.json();
    toast(d.message || 'Cache cleared', 'ok');
    loadAll();
    if (document.getElementById('panel-logs').classList.contains('active')) loadLogs();
  } catch(e) {
    toast(e.message, 'err');
  }
}

// ── Request Logs ──────────────────────────────────────────────────────────────

async function loadLogs() {
  try {
    var res = await fetch(BASE + '/api/dev/logs');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var d = await res.json();
    logsData = d.logs || [];
    renderLogs();
  } catch(e) {
    document.getElementById('logs-content').innerHTML = '<div class="error-banner">⚠ ' + escapeHtml(e.message) + '</div>';
  }
}

function renderLogs() {
  var logs = logsData;
  var el = document.getElementById('logs-content');
  if (!logs.length) {
    el.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:30px">No requests logged yet. Make some API calls and refresh.</div>';
    return;
  }
  var rows = logs.map(function(l) {
    var sc = l.statusCode < 300 ? 'status-2xx' : l.statusCode < 500 ? 'status-4xx' : 'status-5xx';
    var mcolor = l.method === 'GET' ? 'var(--blue)' : l.method === 'POST' ? 'var(--green)' : l.method === 'DELETE' ? 'var(--red)' : 'var(--muted)';
    return '<div class="log-row">' +
      '<span style="color:var(--muted);font-size:10px">#' + l.id + '</span>' +
      '<span style="color:' + mcolor + ';font-weight:700;font-size:10px">' + l.method + '</span>' +
      '<span class="log-url">' + escapeHtml(l.url) + '</span>' +
      '<span class="' + sc + '">' + l.statusCode + '</span>' +
      '<span style="color:var(--muted);text-align:right">' + l.responseTimeMs + 'ms</span>' +
    '</div>';
  }).join('');

  el.innerHTML =
    '<div class="section"><div class="section-hdr">' +
      'Recent Requests (' + logs.length + ')' +
      '<div style="display:flex;gap:6px">' +
        '<button class="btn" onclick="loadLogs()">↻ Refresh</button>' +
        '<button class="btn danger" onclick="clearCache()">⊘ Clear</button>' +
      '</div>' +
    '</div>' +
    '<div class="card" style="padding:0">' +
      '<div class="log-row log-hdr">' +
        '<span>#</span><span>Method</span><span>URL</span><span>Status</span><span style="text-align:right">Time</span>' +
      '</div>' + rows +
    '</div></div>';
}

// ── API Routes ────────────────────────────────────────────────────────────────

function renderRoutes(d) {
  var routes = [
    { method:'POST',   path:'/api/auth/guest',               desc:'Create anonymous guest session' },
    { method:'POST',   path:'/api/auth/register',            desc:'Register new user account' },
    { method:'POST',   path:'/api/auth/login',               desc:'Authenticate and get JWT' },
    { method:'POST',   path:'/api/auth/migrate-guest',       desc:'Merge guest data into account' },
    { method:'GET',    path:'/api/auth/me',                  desc:'Current user profile' },
    { method:'GET',    path:'/api/portfolios',               desc:'List all portfolios for owner' },
    { method:'POST',   path:'/api/portfolios',               desc:'Create new portfolio' },
    { method:'GET',    path:'/api/portfolios/:id',           desc:'Get portfolio with holdings' },
    { method:'DELETE', path:'/api/portfolios/:id',           desc:'Delete portfolio' },
    { method:'GET',    path:'/api/portfolios/:id/snapshot',  desc:'Live P&L with market quotes' },
    { method:'GET',    path:'/api/portfolios/:id/transactions', desc:'Transaction history' },
    { method:'POST',   path:'/api/portfolios/:id/transactions', desc:'Record BUY or SELL' },
    { method:'GET',    path:'/api/market/quote/:ticker',     desc:'Single quote (cache-first)' },
    { method:'GET',    path:'/api/market/bulk',              desc:'Bulk quotes ?tickers=A,B,C' },
    { method:'GET',    path:'/api/market/stock/:ticker',     desc:'Full stock drilldown (optional auth)' },
    { method:'GET',    path:'/api/market/predict/:ticker',   desc:'30-day GBM price prediction' },
    { method:'GET',    path:'/api/health',                   desc:'Aggregate health check' },
    { method:'GET',    path:'/api/health/cache',             desc:'Cache stats' },
    { method:'GET',    path:'/api/dev',                      desc:'Full diagnostic snapshot' },
    { method:'GET',    path:'/api/dev/routes',               desc:'Registered Fastify routes' },
    { method:'GET',    path:'/api/dev/config',               desc:'Sanitized environment config' },
    { method:'GET',    path:'/api/dev/logs',                 desc:'Recent request ring buffer' },
    { method:'DELETE', path:'/api/dev/cache',                desc:'Evict cache + clear log' },
    { method:'GET',    path:'/api/dev/provider',             desc:'Active provider status' },
    { method:'POST',   path:'/api/dev/provider/:type',       desc:'Switch market data provider' },
  ];

  var rawSection = d.rawRoutes ?
    '<div class="section"><div class="section-hdr">Fastify Route Tree (raw)</div>' +
    '<div class="card"><pre style="font-size:10px;color:var(--muted);overflow-x:auto;line-height:1.6">' + escapeHtml(d.rawRoutes) + '</pre></div></div>' : '';

  document.getElementById('routes-content').innerHTML =
    '<div class="section"><div class="section-hdr">Registered Endpoints (' + routes.length + ')</div>' +
      '<div class="card" style="padding:6px 0">' +
        routes.map(function(r) {
          return '<div class="route-line">' +
            '<span class="method ' + r.method + '">' + r.method + '</span>' +
            '<span class="route-path">' + r.path + '</span>' +
            '<span class="route-desc">' + r.desc + '</span></div>';
        }).join('') +
      '</div></div>' + rawSection;
}

// ── Runtime ───────────────────────────────────────────────────────────────────

function renderRuntime(d) {
  var r = d.runtime;
  var heapPct = Math.round(r.memoryMb.heapUsed / r.memoryMb.heapTotal * 100);
  var rssPct  = Math.round(r.memoryMb.rss / r.totalMemMb * 100);
  var uptime = r.uptimeSeconds;
  var uh = Math.floor(uptime/3600), um = Math.floor((uptime%3600)/60), us = uptime%60;

  document.getElementById('runtime-content').innerHTML =
    '<div class="section"><div class="section-hdr">Process</div>' +
      '<div class="grid-4">' +
        '<div class="card"><div class="card-title">Node.js</div><div class="card-val" style="font-size:16px;color:var(--green)">' + r.nodeVersion + '</div><div class="card-sub">' + r.platform + ' ' + r.arch + '</div></div>' +
        '<div class="card"><div class="card-title">PID</div><div class="card-val" style="font-size:16px">' + r.pid + '</div><div class="card-sub">Process ID</div></div>' +
        '<div class="card"><div class="card-title">Uptime</div><div class="card-val" style="font-size:16px;color:var(--blue)">' + uh + 'h ' + um + 'm ' + us + 's</div><div class="card-sub">' + uptime.toLocaleString() + 's total</div></div>' +
        '<div class="card"><div class="card-title">CPUs</div><div class="card-val" style="font-size:16px">' + r.cpus + '</div><div class="card-sub">Logical cores</div></div>' +
      '</div></div>' +
    '<div class="section"><div class="section-hdr">Memory</div>' +
      '<div class="grid-2">' +
        '<div class="card"><div class="card-title">Heap (V8)</div>' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
            '<span style="color:var(--' + (heapPct>85?'red':heapPct>65?'yellow':'green') + ')">' + r.memoryMb.heapUsed + ' MB used</span>' +
            '<span style="color:var(--muted)">' + r.memoryMb.heapTotal + ' MB total</span>' +
          '</div>' +
          '<div class="meter"><div class="meter-fill ' + (heapPct>85?'red':heapPct>65?'yellow':'green') + '" style="width:' + heapPct + '%"></div></div>' +
          '<div class="card-sub" style="margin-top:5px">' + heapPct + '% heap utilisation</div></div>' +
        '<div class="card"><div class="card-title">RSS vs System RAM</div>' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
            '<span style="color:var(--blue)">' + r.memoryMb.rss + ' MB RSS</span>' +
            '<span style="color:var(--muted)">' + r.totalMemMb + ' MB total</span>' +
          '</div>' +
          '<div class="meter"><div class="meter-fill green" style="width:' + rssPct + '%"></div></div>' +
          '<div class="card-sub" style="margin-top:5px">External: ' + r.memoryMb.external + ' MB · Free: ' + r.freeMemMb + ' MB</div></div>' +
      '</div></div>' +
    '<div class="section"><div class="section-hdr">CPU Load Average</div>' +
      '<div class="card"><div class="grid-3" style="margin-bottom:0">' +
        r.loadAvg.map(function(v, i) {
          var pct = Math.min(100, Math.round(v / r.cpus * 100));
          var col = pct > 80 ? 'red' : pct > 50 ? 'yellow' : 'green';
          return '<div><div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
            '<span style="color:var(--muted)">' + ['1 min','5 min','15 min'][i] + '</span>' +
            '<span style="color:var(--' + col + ')">' + v + '</span></div>' +
            '<div class="meter"><div class="meter-fill ' + col + '" style="width:' + pct + '%"></div></div>' +
            '<div class="card-sub" style="margin-top:4px">' + pct + '% of ' + r.cpus + ' CPUs</div></div>';
        }).join('') +
      '</div></div></div>';
}

// ── Database ──────────────────────────────────────────────────────────────────

function renderDatabase(d) {
  var db = d.database;
  document.getElementById('database-content').innerHTML =
    '<div class="section"><div class="section-hdr">Applied Migrations (' + (db.migrations ? db.migrations.length : 0) + ')</div>' +
      '<div class="card" style="padding:0">' +
        (db.migrations && db.migrations.length ?
          '<table><thead><tr><th>#</th><th>Filename</th><th>Applied At</th></tr></thead><tbody>' +
          db.migrations.map(function(m, i) {
            return '<tr><td style="color:var(--muted)">' + (i+1) + '</td><td class="mono">' + escapeHtml(m.filename) + '</td><td class="mono" style="color:var(--muted)">' + new Date(m.appliedAt).toLocaleString() + '</td></tr>';
          }).join('') + '</tbody></table>' :
          '<div style="padding:12px;color:var(--muted);text-align:center">No migration data (running in MEMORY_MODE)</div>') +
      '</div></div>' +
    '<div class="section"><div class="section-hdr">Table Row Counts</div>' +
      '<div class="card" style="padding:0">' +
        (db.tables && db.tables.length ?
          (function() {
            var maxCount = Math.max(1, Math.max.apply(null, db.tables.map(function(t) { return parseInt(t.rowCount || t.row_count || 0); })));
            return '<table><thead><tr><th>Table</th><th>Live Rows</th><th>Bar</th></tr></thead><tbody>' +
              db.tables.map(function(t) {
                var count = parseInt(t.rowCount || t.row_count || 0);
                var pct = Math.round(count / maxCount * 100);
                return '<tr><td class="mono">' + escapeHtml(t.tableName || t.table_name) + '</td><td style="color:var(--blue);font-weight:600">' + count.toLocaleString() + '</td><td style="min-width:120px"><div class="meter"><div class="meter-fill green" style="width:' + pct + '%"></div></div></td></tr>';
              }).join('') + '</tbody></table>';
          })() :
          '<div style="padding:12px;color:var(--muted);text-align:center">No table stats (running in MEMORY_MODE)</div>') +
      '</div></div>';
}

// ── Config ────────────────────────────────────────────────────────────────────

function renderEnv(d) {
  var cfg = d.config;
  document.getElementById('env-content').innerHTML =
    '<div class="section"><div class="section-hdr">Sanitized Environment — ' + Object.keys(cfg).length + ' variables</div>' +
      '<div class="card" style="padding:0">' +
        Object.entries(cfg).map(function(pair) {
          var k = pair[0], v = pair[1];
          var isRedacted = v.includes('redacted');
          return '<div class="env-row"><span class="env-key">' + escapeHtml(k) + '</span><span class="env-val' + (isRedacted ? ' redacted' : '') + '">' + escapeHtml(v) + '</span></div>';
        }).join('') +
      '</div></div>' +
    '<div style="margin-top:8px;color:var(--muted);font-size:11px;padding:0 2px">Secrets matching /secret|password|key|token|jwt/i are masked.</div>';
}

// ── Error ─────────────────────────────────────────────────────────────────────

function showError(msg) {
  var banner = '<div class="error-banner">⚠ ' + escapeHtml(msg) + '</div>';
  var conn = '<div class="card" style="margin-top:10px"><div class="card-title">Connection</div>' +
    '<div style="color:var(--muted);font-size:12px;margin-top:6px">Ensure the API server is running:<br>' +
    '<span class="mono" style="color:var(--blue)">npm run dev</span> → <span class="mono" style="color:var(--blue)">http://localhost:3000</span></div></div>';
  ['overview','runtime','database','env'].forEach(function(id) {
    document.getElementById(id + '-content').innerHTML = banner + conn;
  });
  document.getElementById('routes-content').innerHTML = banner;
  var badge = document.getElementById('overall-badge');
  badge.textContent = 'Offline';
  badge.className = 'header-badge err';
}

// ── Main load ─────────────────────────────────────────────────────────────────

async function loadAll() {
  try {
    var devRes = await fetch(BASE + '/api/dev');
    var routesRes = await fetch(BASE + '/api/dev/routes');

    if (!devRes.ok) throw new Error('/api/dev returned ' + devRes.status);
    devData = await devRes.json();

    var rawRoutes = null;
    if (routesRes.ok) { rawRoutes = (await routesRes.json()).routes; }

    renderOverview(devData);
    renderRoutes(Object.assign({}, devData, { rawRoutes: rawRoutes }));
    renderRuntime(devData);
    renderDatabase(devData);
    renderEnv(devData);

    if (document.getElementById('panel-provider').classList.contains('active')) loadProvider();
    if (document.getElementById('panel-logs').classList.contains('active')) loadLogs();

  } catch(e) {
    showError(e.message || 'Could not connect to API server at ' + BASE);
    renderRoutes({ exchanges: [] });
  }
}

loadAll();
setInterval(loadAll, 30000);
window.addEventListener('jet:refresh', function() { loadAll(); });
</script>
