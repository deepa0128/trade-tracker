<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',system-ui,sans-serif; background:#0f1117; color:#e2e8f0; padding:16px; }
h2 { font-size:15px; font-weight:700; margin-bottom:4px; color:#f1f5f9; }

.controls { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }

.pred-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; }
.pcard { background:#1e2130; border:1px solid #2d3148; border-radius:9px; padding:10px 12px; }
.pcard .pc-ticker { font-size:10px; color:#64748b; font-family:monospace; }
.pcard .pc-name { font-size:13px; font-weight:700; margin:2px 0; }
.pcard .pc-row { display:flex; justify-content:space-between; font-size:11px; margin-top:4px; }
.pcard .pc-label { color:#64748b; }
.pos { color:#4ade80; } .neg { color:#f87171; }
.divider { width:1px; height:16px; background:#2d3148; margin:0 4px; }

function buildTraces() {
  const traces = [];
  RAW.forEach(s => {
    if (activePort !== 'all' && s.portfolio !== activePort) return;
    const shortName = s.label;
    // Historical
    if (showHist) traces.push({
      x: s.hist_dates, y: s.hist, name: shortName + ' (hist)',
      type: 'scatter', mode: 'lines',
      line: {color: s.color, width: 1.8},
      hovertemplate: shortName + ' ₹%{y:,.0f}<extra></extra>'
    });
    // Confidence band
    if (showPred && showBand) {
      traces.push({
        x: [...s.pred_dates, ...s.pred_dates.slice().reverse()],
        y: [...s.pred_upper, ...s.pred_lower.slice().reverse()],
        name: shortName + ' band', type: 'scatter', mode: 'lines',
        fill: 'toself', fillcolor: s.color + '18',
        line: {color:'transparent'},
        showlegend: false, hoverinfo: 'skip'
      });
    }
    // Prediction mean
    if (showPred) traces.push({
      x: s.pred_dates, y: s.pred, name: shortName + ' (pred)',
      type: 'scatter', mode: 'lines',
      line: {color: s.color, width: 1.5, dash: 'dot'},
      hovertemplate: shortName + ' pred ₹%{y:,.0f}<extra></extra>'
    });
  });
  return traces;
}

function redraw() {
  Plotly.react('chart', buildTraces(), PLOTLY_LAYOUT, {responsive:true});
}

function filterPortfolio(p, el) {
  activePort = p;
  document.querySelectorAll('.chip[data-p]').forEach(c => {
    if (!c.dataset.mode) c.classList.toggle('active', c.dataset.p === p);
  });
  redraw();
  renderCards();
}

function toggleMode(mode, el) {
  if (mode==='hist') showHist = !showHist;
  if (mode==='pred') { showPred = !showPred; }
  if (mode==='band') showBand = !showBand;
  el.classList.toggle('active');
  redraw();
}

function renderCards() {
  const container = document.getElementById('pred-cards');
  const filtered = activePort === 'all' ? RAW : RAW.filter(s => s.portfolio === activePort);
  container.innerHTML = filtered.map(s => {
    const upside = s.pred_upside;
    const cls = upside >= 0 ? 'pos' : 'neg';
    const arrow = upside >= 0 ? '▲' : '▼';
    return `<div class="pcard">
      <div class="pc-ticker">${s.ticker}</div>
      <div class="pc-name" style="color:${s.color}">${s.label}</div>
      <div class="pc-row"><span class="pc-label">Current</span><span>₹${s.ltp.toLocaleString('en-IN')}</span></div>
      <div class="pc-row"><span class="pc-label">30d Target</span><span class="${cls}">${arrow} ₹${s.pred_target.toLocaleString('en-IN')}</span></div>
      <div class="pc-row"><span class="pc-label">Est. Upside</span><span class="${cls}">${upside >= 0 ? '+' : ''}</span><span class="${cls}">${upside}%</span></div>
      <div class="pc-row"><span class="pc-label">Portfolio</span><span style="color:#64748b;font-size:10px">${s.portfolio}</span></div>
    </div>`;
  }).join('');
}

redraw();
renderCards();
</script>
</body>
